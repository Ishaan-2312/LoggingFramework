spring.application.name=LoggingFramework
server.port=8080
#server.address=0.0.0.0


#==== Postgre SQL ====
spring.datasource.url=jdbc:postgresql://localhost:5432/<db_name?
spring.datasource.username=postgres
spring.datasource.password=<your_password_
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Mongo =====
spring.data.mongodb.uri=mongodb://localhost:27017/<db_name>


# ====== GitHub =====
spring.security.oauth2.client.registration.github.client-id=<your_client_id>
spring.security.oauth2.client.registration.github.client-secret=<your_client_secret_
spring.security.oauth2.client.registration.github.scope=repo,read:user
